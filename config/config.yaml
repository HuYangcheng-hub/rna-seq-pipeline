# ============================================
# RNA-seq 分析流程 — 配置文件
# ============================================
# 使用前请根据自身环境修改以下路径和参数

samples:
  - control_1
  - control_2
  - treat_1
  - treat_2

paired_end: true

star_index: "/path/to/STAR_index"
gtf: "/path/to/annotations.gtf"
genome_fasta: "/path/to/genome.fasta"

star_params:
  outFilterMismatchNmax: 10
  outFilterMultimapNmax: 10
  alignSJDBoverhangMin: 1

feature_counts_params:
  strand_specific: 0
  min_mapping_quality: 10

deseq2_params:
  padj_cutoff: 0.05
  lfc_cutoff: 1.0
  control_group: "control"
  treat_group: "treat"

resources:
  fastqc_threads: 4
  star_threads: 8
  featurecounts_threads: 4
  memory_mb: 32000
