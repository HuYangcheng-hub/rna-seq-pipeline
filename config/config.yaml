# RNA-seq pipeline configuration
# Replace paths with your own when running on real data.

sample_sheet: "config/samples.tsv"
paired_end: true

reference:
  star_index: "reference/chr22/star_index"
  gtf: "reference/chr22/chr22.gtf"
  genome_fasta: "reference/chr22/Homo_sapiens.GRCh38.dna.chromosome.22.fa"

trimming:
  enabled: false

star_params:
  outFilterMismatchNmax: 10

feature_counts_params:
  strand_specific: 0
  min_mapping_quality: 10
  extra: ""

deseq2_params:
  control_group: "control"
  treat_group: "treat"
  padj_cutoff: 0.05
  lfc_cutoff: 1.0
  min_count: 10
  min_samples: 2

resources:
  fastqc_threads: 2
  trim_threads: 4
  star_threads: 8
  featurecounts_threads: 4
  memory_mb: 32000
