name: rna_seq_pipeline
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11
  - snakemake>=8.0
  - pandas>=2.0
  - pyyaml>=6.0

  # QC and preprocessing
  - fastqc>=0.12
  - multiqc>=1.14
  - fastp>=0.23

  # Alignment and quantification
  - star>=2.7
  - subread>=2.0
  - samtools>=1.18

  # R / Bioconductor
  - r-base>=4.3
  - r-yaml
  - r-ggplot2
  - r-pheatmap
  - bioconductor-deseq2

  # Utilities
  - git
  - pigz
