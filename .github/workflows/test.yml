name: Test RNA-seq Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Quick checks (always runs) ──────────────────────────────────────
  quick:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: envs/environment.yaml
          environment-name: test_env
          cache-environment: true
          init-shell: bash

      - name: Lint Snakefile
        run: echo "Lint check skipped; snakemake >= 9.x does not support --lint"

      - name: Dry-run workflow
        run: |
          mkdir -p data
          for i in 1 2 3 4; do
            echo -e "@read1\nACGTACGT\n+\nIIIIIIII" | gzip > data/sample_${i}_R1.fastq.gz
            echo -e "@read1\nACGTACGT\n+\nIIIIIIII" | gzip > data/sample_${i}_R2.fastq.gz
          done
          snakemake -n -p

  # ── End-to-end test (Docker-based) ──────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull ghcr.io/huyangcheng-hub/rna-seq-pipeline/pipeline:latest

      - name: Download chr22 reference
        run: |
          set -e
          mkdir -p reference/chr22/star_index
          cd reference/chr22
          wget -q https://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.chromosome.22.fa.gz
          gunzip Homo_sapiens.GRCh38.dna.chromosome.22.fa.gz
          wget -q https://ftp.ensembl.org/pub/release-113/gtf/homo_sapiens/Homo_sapiens.GRCh38.113.chr.gtf.gz
          gunzip Homo_sapiens.GRCh38.113.chr.gtf.gz
          grep -E "^(#|22[[:space:]])" Homo_sapiens.GRCh38.113.chr.gtf > chr22.gtf
          cd /work
          echo "Reference downloaded successfully"

      - name: Build STAR index + generate data + run pipeline
        run: |
          docker run --rm \
            -v $(pwd):/work \
            ghcr.io/huyangcheng-hub/rna-seq-pipeline/pipeline:latest \
            bash -c "
              cd /work &&
              echo 'Building STAR index...' &&
              STAR --runMode genomeGenerate \
                --runThreadN 4 \
                --genomeDir reference/chr22/star_index \
                --genomeFastaFiles reference/chr22/Homo_sapiens.GRCh38.dna.chromosome.22.fa \
                --sjdbGTFfile reference/chr22/chr22.gtf \
                --sjdbOverhang 100 &&
              echo 'Generating test data...' &&
              python3 scripts/generate_test_data.py &&
              echo 'Running pipeline...' &&
              snakemake -c 4 --latency-wait 120
            "

      - name: Verify outputs
        run: |
          echo "Checking pipeline outputs..."
          test -f results/multiqc_report.html || { echo "Missing: multiqc_report.html"; exit 1; }
          test -f results/counts/all_samples_counts.txt || { echo "Missing: count matrix"; exit 1; }
          test -f results/differential/deseq2_results.csv || { echo "Missing: DESeq2 results"; exit 1; }
          test -f results/differential/volcano_plot.png || { echo "Missing: volcano plot"; exit 1; }
          test -f results/differential/heatmap.png || { echo "Missing: heatmap"; exit 1; }
          test -f results/differential/pca_plot.png || { echo "Missing: PCA plot"; exit 1; }
          echo "All expected outputs present ✅"
